services:
  webssh:
    image: nameguoguo/webssh
    build: .
    container_name: webssh
    restart: unless-stopped
    ports:
      - "9627:9627"
    environment:
      - PORT=9627
    healthcheck:
      test: curl -f http://localhost:9627/health || exit 1
      interval: 30s
      timeout: 3s
      retries: 3
