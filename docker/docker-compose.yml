services:
  webssh:
    image: nameguoguo/webssh
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: webssh
    restart: unless-stopped
    read_only: true
    ports:
      - "9627:9627"
    environment:
      - PORT=9627
      # - GUACD_HOST=guacd        # 启用 RDP/VNC（需 guacd 服务）
      # - DOCKER_SOCKET=/var/run/docker.sock  # 启用原生 Docker 管理
    volumes:
      # - /var/run/docker.sock:/var/run/docker.sock
      - ./data:/app/data
    tmpfs:
      - /tmp
    healthcheck:
      test: curl -f http://localhost:9627/health || exit 1
      interval: 30s
      timeout: 3s
      retries: 3

  # guacd:  # RDP/VNC 远程桌面代理（取消上方 GUACD_HOST 注释后启用）
  #   image: guacamole/guacd
  #   container_name: guacd
  #   restart: unless-stopped
